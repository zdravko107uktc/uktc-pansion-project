server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
  error:
    include-message: always

spring:
  application:
    name: pansion-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://${DB_HOST:${MYSQLHOST:localhost}}:${DB_PORT:${MYSQLPORT:3306}}/${DB_NAME:${MYSQLDATABASE:checkin_checkout}}?useUnicode=true&characterEncoding=utf8&serverTimezone=${APP_TIMEZONE:Europe/Sofia}&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USER:${MYSQLUSER:root}}
    password: ${DB_PASSWORD:${MYSQLPASSWORD:rootpassword}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: pansion-pool
      maximum-pool-size: ${DB_POOL_SIZE:10}

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: ${APP_TIMEZONE:Europe/Sofia}
        format_sql: false
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0

  mail:
    host: ${MAIL_SMTP_HOST:}
    port: ${MAIL_SMTP_PORT:587}
    username: ${MAIL_SMTP_USERNAME:}
    password: ${MAIL_SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}
          connectiontimeout: ${MAIL_SMTP_TIMEOUT_MS:10000}
          timeout: ${MAIL_SMTP_TIMEOUT_MS:10000}
          writetimeout: ${MAIL_SMTP_TIMEOUT_MS:10000}

  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 8MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

app:
  system-admin-email: ${SYSTEM_ADMIN_EMAIL:zdravko.h.anev@gmail.com}
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:8080}
  timezone: ${APP_TIMEZONE:Europe/Sofia}
  jwt:
    secret: ${JWT_SECRET:f2d4c95ec095862af68ae607be05ae45556aa2ae2b87a9306185cac71295bae2}
    issuer: ${JWT_ISSUER:uktc-pansion}
    access-token-seconds: ${JWT_ACCESS_TTL_SECONDS:14400}
    refresh-token-seconds: ${JWT_REFRESH_TTL_SECONDS:1209600}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:3000,http://127.0.0.1:8080,http://127.0.0.1:3000}
  mail:
    from: ${MAIL_FROM:school.inventory.bot@gmail.com}
    from-name: ${MAIL_FROM_NAME:UKTC Pansion}
    force-log-only: ${MAIL_FORCE_LOG_ONLY:false}
  security:
    password-reset-token-minutes: ${PASSWORD_RESET_TOKEN_MINUTES:30}
    max-failed-logins: ${SECURITY_MAX_FAILED_LOGINS:5}
    lockout-minutes: ${SECURITY_LOCKOUT_MINUTES:15}
    password-history-depth: ${SECURITY_PASSWORD_HISTORY_DEPTH:5}
    require-email-verification: ${SECURITY_REQUIRE_EMAIL_VERIFICATION:false}
    email-verification-token-hours: ${SECURITY_EMAIL_VERIFICATION_HOURS:48}

logging:
  level:
    root: INFO
    bg.uktc.pansion: INFO
